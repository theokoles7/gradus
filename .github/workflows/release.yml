name: Release

on:
  push:
    branches: [main]
    paths:
      - ".semversioner/next-release/*.json"

jobs:
  test:
    name:     Test
    runs-on:  ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: pip install -e ".[dev]"

      - name: Run Tests
        run: pytest

  release:
    name:     Release
    runs-on:  ubuntu-latest
    needs:    test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install semversioner

      - name: Generate changelog
        run: semversioner changelog > CHANGELOG.md

      - name: Release
        run: semversioner release

      - name: Read version
        id: version
        run: |
          VERSION=$(semversioner current-version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update pyproject.toml version
        run: |
          sed -i "s/^version\s*=\s*.*/version =           \"${{ steps.version.outputs.version }}\"/" pyproject.toml

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md .semversioner/ pyproject.toml
          if git diff --staged --quiet; then
            echo "ERROR: semversioner produced no changes to commit"
            exit 1
          fi
          git commit -m "Release v${{ steps.version.outputs.version }}"

      - name: Tag & Push
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name:     "v${{ steps.version.outputs.version }}"
          body_path: CHANGELOG.md